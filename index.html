<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>AquaSense | Splash</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #0a1a1f;
    }

    .splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #0a1a1f 0%, #0d262e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    /* Orb glass effect */
    .glass-orb {
      position: absolute;
      width: 50vw;
      height: 50vw;
      max-width: 500px;
      max-height: 500px;
      background: radial-gradient(circle at 30% 30%, rgba(95,217,232,0.08), rgba(95,217,232,0.02));
      border-radius: 50%;
      filter: blur(40px);
      pointer-events: none;
    }

    .orb-1 { top: -20%; right: -20%; }
    .orb-2 { bottom: -30%; left: -20%; background: radial-gradient(circle at 70% 70%, rgba(95,217,232,0.06), transparent); }

    /* Konten utama */
    .content {
      text-align: center;
      z-index: 10;
      animation: fadeScale 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes fadeScale {
      0% { opacity: 0; transform: scale(0.96); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Logo lingkaran */
    .logo-ring {
      width: 110px;
      height: 110px;
      margin: 0 auto 32px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 1.5px solid rgba(95,217,232,0.3);
      border-radius: 50%;
      animation: pulseRing 2s ease-in-out infinite;
    }

    .ring:nth-child(2) {
      width: 85%;
      height: 85%;
      animation: pulseRing 2s ease-in-out infinite 0.4s;
    }

    .ring:nth-child(3) {
      width: 70%;
      height: 70%;
      animation: pulseRing 2s ease-in-out infinite 0.8s;
    }

    @keyframes pulseRing {
      0% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.08); opacity: 0.1; }
      100% { transform: scale(1); opacity: 0.4; }
    }

    .logo-icon {
      font-size: 42px;
      color: #5fd9e8;
      z-index: 2;
      filter: drop-shadow(0 0 12px rgba(95,217,232,0.3));
    }

    /* Teks */
    h1 {
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: 4px;
      color: #ffffff;
      margin-bottom: 8px;
      font-family: -apple-system, 'Inter', sans-serif;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #5fd9e8;
      margin: 16px auto;
      opacity: 0.6;
    }

    .sub {
      color: rgba(255,255,245,0.55);
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 400;
    }

    .tagline {
      color: rgba(255,255,245,0.4);
      font-size: 0.6rem;
      margin-top: 24px;
      letter-spacing: 0.5px;
    }

    /* Loading indicator minimal */
    .loading {
      margin-top: 48px;
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: #5fd9e8;
      border-radius: 50%;
      opacity: 0.3;
      animation: dotFade 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    .dot:nth-child(4) { animation-delay: 0.6s; }

    @keyframes dotFade {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); background: #7fe9f5; }
    }

    /* Status text */
    .status-text {
      font-size: 0.6rem;
      color: rgba(95,217,232,0.5);
      margin-top: 16px;
      font-family: monospace;
      letter-spacing: 1px;
    }

    /* Responsive */
    @media (max-width: 550px) {
      .logo-ring { width: 80px; height: 80px; }
      .logo-icon { font-size: 32px; }
      h1 { font-size: 1.5rem; letter-spacing: 3px; }
      .divider { width: 32px; }
    }
  </style>
</head>
<body>
<div class="splash" id="splashScreen">
  <div class="glass-orb orb-1"></div>
  <div class="glass-orb orb-2"></div>
  
  <div class="content">
    <div class="logo-ring">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <i class="fas fa-water logo-icon"></i>
    </div>
    
    <h1>AQUASENSE</h1>
    <div class="divider"></div>
    <div class="sub">Marine Intelligence</div>
    
    <div class="loading">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="status-text" id="statusText">INITIALIZING SYSTEM</div>
    <div class="tagline">ESP32 · Water Quality · Autonomous Path</div>
  </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<script>
  (function() {
    const statusEl = document.getElementById('statusText');
    const messages = [
      'CONNECTING SENSORS',
      'CALIBRATING MODULES',
      'LOADING INTERFACE'
    ];
    let idx = 0;
    
    const interval = setInterval(() => {
      idx = (idx + 1) % messages.length;
      if (statusEl) statusEl.textContent = messages[idx];
    }, 800);
    
    setTimeout(() => {
      clearInterval(interval);
      const splash = document.getElementById('splashScreen');
      splash.style.transition = 'opacity 0.5s ease';
      splash.style.opacity = '0';
      setTimeout(() => {
        window.location.href = 'naypath.html';
      }, 500);
    }, 2500);
  })();
</script>
</body>
</html>
